{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-stack {% if dashboard %}flash-stack-dashboard{% endif %}">
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
{% endwith %}
